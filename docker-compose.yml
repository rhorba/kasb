name: kasb

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       kasb
      POSTGRES_USER:     kasb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kasb_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/src/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./packages/db/src/rls.sql:/docker-entrypoint-initdb.d/02-rls.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kasb -d kasb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Next.js web app ────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:  postgresql://kasb:${POSTGRES_PASSWORD:-kasb_secret}@postgres:5432/kasb
      NEXTAUTH_URL:  ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_SECRET:   ${AUTH_SECRET:?AUTH_SECRET is required}
      NODE_ENV:      production
      # Optional — leave empty in dev to use MockOtpService
      INFOBIP_API_KEY:     ${INFOBIP_API_KEY:-}
      INFOBIP_BASE_URL:    ${INFOBIP_BASE_URL:-}
      INFOBIP_SENDER_NAME: ${INFOBIP_SENDER_NAME:-Kasb}
      # R2 (receipt photos) — optional in Sprint 0
      R2_ACCOUNT_ID:       ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID:    ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET:           ${R2_BUCKET:-kasb-receipts}
      # VAPID — push notifications (generate keys: node -e "const wp=require('web-push');console.log(JSON.stringify(wp.generateVAPIDKeys()))")
      VAPID_EMAIL:              ${VAPID_EMAIL:-admin@kasb.ma}
      VAPID_PUBLIC_KEY:         ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY:        ${VAPID_PRIVATE_KEY:-}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── pg-boss worker (score compute, alerts, sync) ───────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kasb:${POSTGRES_PASSWORD:-kasb_secret}@postgres:5432/kasb
      NODE_ENV:     production
    depends_on:
      postgres:
        condition: service_healthy

  # ── Caddy reverse proxy (TLS termination) ─────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
